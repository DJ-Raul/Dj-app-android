name: dj_controller
description: DJ App with Hercules DJControl Inpulse 300 support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio
  just_audio: ^0.9.36
  audio_session: ^0.1.18
  flutter_soloud: ^2.0.0        # Low-latency audio engine

  # MIDI over USB
  flutter_midi_pro: ^2.0.1
  usb_serial: ^0.5.0            # Android USB OTG

  # UI
  provider: ^6.1.1
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0

  # Waveform
  fftea: ^1.4.0                 # FFT for waveform analysis
  audio_waveforms: ^1.0.5

  # Storage & Utils
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  file_picker: ^8.0.3

  # Networking (SoundCloud)
  dio: ^5.4.1
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
